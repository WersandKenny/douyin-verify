name: 抖音验证
on:
  workflow_dispatch:
    inputs:
      url:
        description: '抖音分享链接'
        required: true
        default: 'https://v.douyin.com/Y27sEJPljzM/'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== 测试1: 直连抖音短链 ==="
          curl -sv --max-time 20 "https://v.douyin.com/Y27sEJPljzM/" 2>&1 | head -30
          echo ""
          echo "=== 测试2: Cloudflare Worker ==="
          curl -s --max-time 30 "https://douyin-proxy.giant-calliandra.workers.dev/?url=https://v.douyin.com/Y27sEJPljzM/"
