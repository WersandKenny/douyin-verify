name: 抖音验证
on:
  workflow_dispatch:
    inputs:
      url:
        description: '抖音分享链接'
        required: true
        default: 'https://v.douyin.com/Y27sEJPljzM/'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - run: curl -s --max-time 30 "https://douyin-proxy.nosy-catsup.workers.dev/?url=${{ github.event.inputs.url }}"
